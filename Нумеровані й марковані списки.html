<!DOCTYPE html>
<html lang="uk">
<head>

    <title>Практична робота №3 - Списки</title>
</head>
<body>

    <h3>Вправа 1. Маркований список</h3>

    <h3>Вправа 2. Нумерований список</h3>

    <ol type="i">
        <li><font size="6" color="red">Червоний</font></li>
        <li><font size="6" color="orange">Оранжевий</font></li>
        <li><font size="6" color="yellow">Жовтий</font></li>
        <li><font size="6" color="green">Зелений</font></li>

    </ol>

</body>
</html>
